name: Poll all alert sources

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - run: python poll.py
        env:
          DISCORD_WEBHOOK_ALERTCAROLINA: ${{ secrets.DISCORD_WEBHOOK_ALERTCAROLINA }}

      - name: Commit updated state
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add state/
          git diff --cached --quiet || git commit -m "Update alert state"
          git push